<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let nbrsecret = Math.floor(Math.random() * 10) + 1;
        let proposition = 0;
        let tentatives = 0;

        while (proposition !== nbrsecret) {
            proposition = Number(prompt("Entrer un nombre entre 1 et 10:"));
            tentatives++;

            if (proposition > nbrsecret) {
                alert("plus petit");
            } else if (proposition < nbrsecret) {
                alert("plus grand");
            }
        }

        alert("le nombre de tentatives:" + tentatives);
    </script>
</body>

</html>
